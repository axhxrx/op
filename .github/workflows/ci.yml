name: CI + Publish (if needed)
on:
  push:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Test (Bun)
        run: bun test

      # deno check is done locally but can't currently be done in CI because this repo is a git submodule of the main @axhxrx/megarepo and deno currently doesn't support ejected monorepo sublibraries, so it can't work here (T_T)
      - name: Lint (Deno)
        run: deno lint

      - name: JSR check
        run: npx jsr publish --allow-dirty --dry-run

  # Only run if we're on main and the test job succeeded:
  publish:
    needs: [test]
    runs-on: ubuntu-latest
    if: ${{ success() && startsWith(github.ref, 'refs/heads/main') }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - name: 'Publish package (if new version exists)'
        run: npx jsr publish --allow-dirty
